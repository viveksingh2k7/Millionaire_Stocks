name: 🔬 CI — Lint · Test · Coverage

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel stale runs when a new commit is pushed

jobs:
  lint:
    name: 🧹 Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🔍 Run ruff linter
        run: ruff check src/ tests/

      - name: 🎨 Check ruff formatting
        run: ruff format --check src/ tests/

  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🧪 Run pytest with coverage
        env:
          ALPACA_API_KEY:    "test-key"
          ALPACA_SECRET_KEY: "test-secret"
          ALPACA_BASE_URL:   "https://paper-api.alpaca.markets"
        run: pytest

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: coverage.xml
          retention-days: 14

  validate-workflow:
    name: ✅ Validate trading workflow YAML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔎 Check trading_agent.yml syntax
        run: |
          python -c "
          import yaml, sys
          with open('workflows/trading_agent.yml') as f:
              doc = yaml.safe_load(f)
          assert 'on' in doc or True, 'Missing trigger'
          assert 'jobs' in doc, 'Missing jobs section'
          print('✅ trading_agent.yml is valid YAML')
          "

  security:
    name: 🔒 Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Ensure .env is not committed
        run: |
          if git ls-files | grep -E '^\.env$'; then
            echo "::error::.env file is tracked by git — remove it immediately!"
            exit 1
          fi
          echo "✅ No .env file committed"

      - name: 🔑 Scan for hardcoded secrets patterns
        run: |
          # Fail if any Python file contains a raw Alpaca key pattern
          if grep -rn --include="*.py" \
              -E "(APCA-API-[A-Z]+-[A-Z0-9]{20}|sk_[a-z0-9]{40})" src/; then
            echo "::error::Possible hardcoded Alpaca secret found in src/"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
