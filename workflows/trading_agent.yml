name: 📈 Millionaire Stocks — Trading Agent

on:
  # ──────────────────────────────────────────────────────────────
  # Both EST and EDT crons are active year-round so the agent always
  # fires near 09:35 ET regardless of daylight saving time.
  # The concurrency group below ensures only one run executes at a
  # time — the second trigger is queued and skipped if one is in
  # progress, preventing duplicate orders.
  # ──────────────────────────────────────────────────────────────
  schedule:
    - cron: "35 13 * * 1-5"   # 09:35 ET (EST, UTC-5, Nov–Mar)
    - cron: "35 14 * * 1-5"   # 09:35 ET (EDT, UTC-4, Mar–Nov)

  # ── Allow manual trigger from GitHub Actions tab ───────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no real orders)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      order_qty:
        description: "Shares per trade"
        required: false
        default: "1"

# Prevent duplicate runs when both EST and EDT crons fire in the same window
concurrency:
  group: trading-agent
  cancel-in-progress: false   # queue rather than cancel — avoids skipping legitimate runs

jobs:
  trade:
    name: Run S&P 500 Strategy Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 60         # safety cap — scanner should finish well under this
    permissions:
      contents: write   # required to commit signals.json back to the repo

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Create runtime directories ────────────────────────
      - name: 📁 Prepare directories
        run: mkdir -p logs docs

      # ── 5. Run the trading agent ──────────────────────────────
      - name: 🚀 Run Trading Agent
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          # ── Strategy parameters (override via workflow_dispatch) ──
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'true' }}
          ORDER_QTY:           ${{ github.event.inputs.order_qty || '1' }}
          STOP_LOSS_PCT:       "0.05"     # 5% stop-loss (hard floor)
          PROFIT_TARGET_PCT:   "0.10"     # 10% take-profit — sell when +10% from entry
          HIGH_VOLUME_MULT:    "1.5"      # volume must be 1.5× 20-day avg to confirm entry
          BUY_THRESHOLD:       "3"        # min 3/6 conditions for BUY
          MIN_VOLUME:          "2000000"  # 2M minimum avg daily volume (high-liquidity filter)
          MAX_POSITIONS:       "9"        # 9 high-conviction momentum positions
          RATE_LIMIT_SEC:      "0.35"     # seconds between API calls
        run: |
          python src/strategy.py

      # ── 6. Publish signals.json to GitHub Pages ──────────────
      - name: 🌐 Publish dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signals.json
          if git diff --cached --quiet; then
            echo "No signal changes — skipping commit."
          else
            git commit -m "chore: update signals.json [$(date -u '+%Y-%m-%d %H:%M')] [skip ci]"
            git push
          fi

      # ── 7. Upload log artifacts ───────────────────────────────
      - name: 📊 Upload signal logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ── 8. Notify on failure ──────────────────────────────────
      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "::error::Trading agent failed! Check logs above for details."
          echo "Run ID: ${{ github.run_id }}"
          echo "Check artifacts for full log output."
