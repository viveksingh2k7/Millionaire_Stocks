[tool.ruff]
target-version = "py311"
line-length = 100
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
]
exclude = [".git", "__pycache__", "logs", ".env"]

[tool.ruff.per-file-ignores]
"tests/*" = ["F401"]   # allow unused imports in test files

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short --cov=src --cov-report=term-missing --cov-report=xml"
python_files   = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.coverage.run]
source = ["src"]
omit   = ["tests/*", "logs/*"]

[tool.coverage.report]
fail_under = 70
show_missing = true
